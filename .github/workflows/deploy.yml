name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve SSH port
        id: ssh
        run: echo "port=${DEPLOY_PORT:-22}" >> "$GITHUB_OUTPUT"
        env:
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}

      - name: Prepare SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ steps.ssh.outputs.port }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ steps.ssh.outputs.port }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REPOSITORY: ${{ github.repository }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -eu
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -eux
             mkdir -p '$DEPLOY_PATH'
             cd '$DEPLOY_PATH'
             if [ ! -d .git ]; then
               git init
               git remote add origin 'git@github.com:$DEPLOY_REPOSITORY.git'
             else
               git remote set-url origin 'git@github.com:$DEPLOY_REPOSITORY.git'
             fi
             git fetch origin '$DEPLOY_BRANCH' --prune
             git reset --hard 'origin/$DEPLOY_BRANCH'
             chmod +x scripts/deploy.sh scripts/init-https.sh scripts/renew-https.sh
             ./scripts/deploy.sh"
