name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve SSH port
        id: ssh
        run: echo "port=${DEPLOY_PORT:-22}" >> "$GITHUB_OUTPUT"
        env:
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}

      - name: Prepare SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ steps.ssh.outputs.port }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ steps.ssh.outputs.port }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REPOSITORY: ${{ github.repository }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -eu
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -eux
             mkdir -p '$DEPLOY_PATH'
             cd '$DEPLOY_PATH'
             if [ ! -d .git ]; then
               git init
               git remote add origin 'git@github.com:$DEPLOY_REPOSITORY.git'
             else
               git remote set-url origin 'git@github.com:$DEPLOY_REPOSITORY.git'
             fi
             git fetch origin '$DEPLOY_BRANCH' --prune
             git reset --hard 'origin/$DEPLOY_BRANCH'
             chmod +x scripts/deploy.sh
             ./scripts/deploy.sh"

      - name: Verify public API
        run: |
          set -eu
          attempt=1
          while [ "$attempt" -le 5 ]; do
            if curl --fail --silent --show-error --max-time 15 \
              https://bookeeper.lollipopzzz.cn/api/options >/dev/null; then
              echo "Public /api/options probe succeeded on attempt $attempt"
              exit 0
            fi
            sleep 2
            attempt=$((attempt + 1))
          done
          echo "Public /api/options probe failed after 5 attempts" >&2
          exit 1

      - name: Collect deployment diagnostics
        if: failure()
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ steps.ssh.outputs.port }}
        run: |
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "docker inspect --format 'bookeeper restart_count={{.RestartCount}} status={{.State.Status}}' bookeeper || true
             docker logs --tail 100 bookeeper || true
             cd \"\$HOME/gateway\" && docker compose logs --tail 100 nginx || true"
