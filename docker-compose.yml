services:
  bookeeper:
    build:
      context: .
      dockerfile: Dockerfile
    image: bookeeper:node-lts-alpine
    container_name: bookeeper
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      TZ: Asia/Shanghai
    networks:
      - web

networks:
  web:
    external: true
    name: web
